<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berat Çetin | Yazılım Geliştirici</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .neon-text { text-shadow: 0 0 10px #a020f0, 0 0 20px #a020f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(0, 0, 0, 0.2); }
        .neon-glow { box-shadow: 0 0 15px rgba(160, 32, 240, 0.5); transition: 0.3s; }
        @keyframes spin-slow { to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 1s linear infinite; }
        
        /* Preloader CSS */
        #preloader { background-color: #0b0014; }
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-[#0b0014] dark:text-gray-200 leading-relaxed overflow-x-hidden">

    <div id="preloader" class="fixed inset-0 z-[100] flex items-center justify-center transition-opacity duration-700">
        <div class="relative flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-purple-900/20 border-t-purple-500 rounded-full animate-spin-slow"></div>
            <p class="mt-4 text-purple-400 font-bold tracking-widest text-xs uppercase animate-pulse">Başlatılıyor</p>
        </div>
    </div>

    <header class="fixed top-0 w-full z-50 glass border-b border-purple-900/50">
        <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold dark:text-white text-gray-900">
                <a href="index.html"><span class="text-purple-500 underline underline-offset-4 decoration-2">Cetin</span>.Digital</a>
            </div>
            
            <ul class="hidden md:flex items-center space-x-8 font-medium">
                <li><a href="index.html" class="text-purple-500 font-bold">Ana Sayfa</a></li>
                <li><a href="projeler.html" class="hover:text-purple-400 transition">Çalışmalarım</a></li>
                <li><a href="privacy.html" class="hover:text-purple-400 transition">Privacy & Terms</a></li>
                
                <button id="theme-toggle" class="p-2 rounded-lg bg-gray-100 dark:bg-white/5 border border-gray-200 dark:border-white/10 hover:border-purple-500 transition-all flex items-center justify-center min-w-[40px] min-h-[40px]">
                    <svg id="theme-toggle-dark-icon" class="w-5 h-5 dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5 dark:block text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464l-.707-.707a1 1 0 00-1.414 1.414l.707.707a1 1 0 001.414-1.414zm2.12 10.607a1 1 0 010-1.414l.706-.707a1 1 0 111.414 1.414l-.707.707a1 1 0 01-1.414 0zM4 11a1 1 0 100-2H3a1 1 0 100 2h1z"></path></svg>
                </button>
            </ul>

            <button id="menu-btn" class="md:hidden text-gray-900 dark:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </nav>

        <div id="mobile-menu" class="hidden md:hidden absolute w-full bg-white dark:bg-[#0b0014] border-b border-purple-900/50 px-6 py-6 space-y-4 shadow-xl text-center">
            <a href="index.html" class="block text-purple-500 font-bold">Ana Sayfa</a>
            <a href="projeler.html" class="block hover:text-purple-500">Çalışmalarım</a>
            <a href="privacy.html" class="block hover:text-purple-500">Privacy & Terms</a>
        </div>
    </header>

    <main class="min-h-screen flex items-center justify-center pt-32 pb-20 px-6">
        <div class="max-w-5xl mx-auto text-center flex flex-col items-center">
            <div class="relative mb-10 flex justify-center">
                <div class="relative">
                    <div class="absolute inset-0 rounded-full bg-purple-600/30 blur-3xl"></div>
                    <img src="beratcetinprofil.png" alt="Berat Çetin" class="relative z-10 rounded-full w-44 h-44 md:w-56 md:h-56 object-cover border-4 border-purple-500 neon-glow shadow-2xl">
                </div>
            </div>
            
            <h2 class="text-purple-500 font-bold tracking-[0.3em] uppercase text-sm md:text-base mb-6">HOŞ GELDİNİZ</h2>
            
            <h1 class="text-5xl md:text-7xl lg:text-8xl font-black dark:text-white text-gray-900 mb-8 leading-tight">
                Modern Çözümler <br> 
                <span class="neon-text text-purple-400">Profesyonel Kodlama</span>
            </h1>
            
            <p class="max-w-2xl mx-auto text-gray-500 dark:text-gray-400 text-lg md:text-xl mb-12 italic">"Dijital dünyada iz bırakmak için buradayım."</p>
            
            <div class="flex flex-wrap justify-center gap-6">
                <a href="projeler.html" class="px-10 py-4 bg-purple-600 rounded-xl font-bold text-white hover:bg-purple-700 transition-all transform hover:scale-105">Çalışmalarım</a>
                <a href="privacy.html" class="px-10 py-4 border-2 border-purple-500 rounded-xl font-bold text-purple-500 hover:bg-purple-500/10 transition-all transform hover:scale-105">Yasal Bilgiler</a>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center border-t border-gray-200 dark:border-white/5 bg-gray-50 dark:bg-[#0b0014]">
        <p class="text-gray-500 text-sm">&copy; 2026 Berat Çetin. Tüm Hakları Saklıdır.</p>
    </footer>

    <script>
        // 1. Preloader Fonksiyonu (Donma Engelleme)
        function hidePreloader() {
            const preloader = document.getElementById('preloader');
            if(preloader) {
                preloader.style.opacity = '0';
                setTimeout(() => {
                    preloader.style.display = 'none';
                    document.body.style.overflow = 'auto';
                }, 700);
            }
        }
        window.addEventListener('load', hidePreloader);
        // Eğer 2 saniye içinde yüklenmezse zorla kapat (Güvenlik önlemi)
        setTimeout(hidePreloader, 2000);

        // 2. Mobile Menu
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        if(menuBtn) {
            menuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // 3. Dark Mode Toggle
        const themeBtn = document.getElementById('theme-toggle');
        if(themeBtn) {
            themeBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
            });
        }

        // Tema ayarını kontrol et
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</body>
</html>
