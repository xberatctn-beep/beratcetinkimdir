<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Cetin.Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- TEMEL RENKLER VE AYARLAR --- */
        :root {
            --bg-color: #0f172a;      /* Koyu Arka Plan */
            --text-color: #f8fafc;    /* Beyaz Metin */
            --accent-color: #8b5cf6;  /* Mor Vurgu */
            --card-bg: #1e293b;       /* Kart Arka Planı */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* --- NAVİGASYON (ÜST MENÜ) DÜZENLEME --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between; /* Logo solda, menü sağda */
            align-items: center;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            white-space: nowrap;
        }

        .logo span { color: var(--accent-color); }

        /* Sağ tarafı (Döviz + Linkler) kapsayan grup */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px; /* Elemanlar arası boşluk */
        }

        /* Döviz Bandı Kutusu */
        .doviz-box {
            background: rgba(139, 92, 246, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            font-size: 13px;
            color: #00ff88;
            min-width: 100px;
            text-align: center;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-color);
        }

        /* --- BLOG İÇERİK DÜZENİ --- */
        .blog-container {
            max-width: 1100px;
            margin: 120px auto 50px;
            padding: 0 20px;
        }

        .blog-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .blog-header h1 { font-size: 36px; margin-bottom: 10px; }
        .blog-header p { color: #94a3b8; }

        /* Blog Kartları Grid Yapısı */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .blog-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

            transform: translateY(-10px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0
