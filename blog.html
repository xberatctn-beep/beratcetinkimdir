<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Cetin.Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <nav>
        <a href="index.html" class="logo">Cetin<span>.Digital</span></a>
        <div class="nav-right">
            <div class="doviz-box" id="usd-rate-blog">USD: --.--₺</div>
            <div class="nav-links">
                <a href="index.html">Ana Sayfa</a>
                <a href="blog.html" class="active">Blog</a>
                <a href="index.html#contact">İletişim</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div style="text-align: center; margin-bottom: 50px;">
            <h1>Dijital Notlarım</h1>
            <p>Yazılım ve teknoloji dünyasından güncel bilgiler.</p>
        </div>

        <div class="blog-grid">
            <article class="blog-card" onclick="location.href='doviz-yazisi.html'">
                <img src="websiteai.png" class="blog-img">
                <div class="blog-content">
                    <h3>Canlı Döviz Bandı Ekleme</h3>
                    <p>Sitenize dinamik finansal verileri nasıl entegre edersiniz?</p>
                </div>
            </article>
        </div>
    </main>

    <script>
        fetch('https://api.exchangerate-api.com/v4/latest/USD').then(res => res.json()).then(data => {
            document.getElementById('usd-rate-blog').innerText = `USD: ${data.rates.TRY.toFixed(2)}₺`;
        });
    </script>
</body>
</html>
