<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Cetin.Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- TEMEL RENKLER VE AYARLAR --- */
        :root {
            --bg-color: #0f172a;      /* Koyu Arka Plan */
            --text-color: #f8fafc;    /* Beyaz Metin */
            --accent-color: #8b5cf6;  /* Mor Vurgu */
            --card-bg: #1e293b;       /* Kart Arka Planı */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* --- NAVİGASYON (ÜST MENÜ) DÜZENLEME --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between; /* Logo solda, menü sağda */
            align-items: center;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            white-space: nowrap;
        }

        .logo span { color: var(--accent-color); }

        /* Sağ tarafı (Döviz + Linkler) kapsayan grup */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px; /* Elemanlar arası boşluk */
        }

        /* Döviz Bandı Kutusu */
        .doviz-box {
            background: rgba(139, 92, 246, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            font-size: 13px;
            color: #00ff88;
            min-width: 100px;
            text-align: center;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-color);
        }

        /* --- BLOG İÇERİK DÜZENİ --- */
        .blog-container {
            max-width: 1100px;
            margin: 120px auto 50px;
            padding: 0 20px;
        }

        .blog-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .blog-header h1 { font-size: 36px; margin-bottom: 10px; }
        .blog-header p { color: #94a3b8; }

        /* Blog Kartları Grid Yapısı */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .blog-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .blog-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .blog-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .blog-content {
            padding: 25px;
        }

        .category-tag {
            font-size: 12px;
            color: var(--accent-color);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
        }

        .blog-content h3 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #fff;
        }

        .blog-content p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .blog-footer {
            margin-top: auto;
            font-size: 12px;
            color: #64748b;
            display: flex;
            justify-content: space-between;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 768px) {
            .nav-right { gap: 10px; }
            .doviz-box { display: none; } /* Mobilde çok kalabalık olmaması için dövizi gizledik */
            .logo { font-size: 18px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Cetin<span>.Digital</span></a>
        
        <div class="nav-right">
            <div class="doviz-box" id="usd-rate">USD: --.--₺</div>
            
            <div class="nav-links">
                <a href="index.html">Ana Sayfa</a>
                <a href="blog.html" class="active">Blog</a>
                <a href="index.html#contact">İletişim</a>
            </div>
        </div>
    </nav>

    <main class="blog-container">
        <header class="blog-header">
            <h1>Dijital Notlarım</h1>
            <p>Yazılım, tasarım ve yapay zeka üzerine düşüncelerim.</p>
        </header>

        <div class="blog-grid">
            
            <article class="blog-card" onclick="location.href='doviz-yazisi.html'">
                <img src="websiteai.png" alt="Döviz Bandı" class="blog-img">
                <div class="blog-content">
                    <span class="category-tag">Teknoloji</span>
                    <h3>Web Siteme Nasıl Canlı Döviz Bandı Ekledim?</h3>
                    <p>JavaScript ve API kullanarak sitenize dinamik finansal veriler eklemenin en hızlı yolu...</p>
                    <div class="blog-footer">
                        <span>14 Mart 2026</span>
                        <span>4 dk okuma</span>
                    </div>
                </div>
            </article>

            </div>
    </main>

    <script>
        // --- CANLI DÖVİZ VERİSİ ---
        async function fetchCurrency() {
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await response.json();
                const tryRate = data.rates.TRY;
                document.getElementById('usd-rate').innerText = `USD: ${tryRate.toFixed(2)}₺`;
            } catch (error) {
                console.error("Döviz verisi çekilemedi.");
                document.getElementById('usd-rate').innerText = "USD: --.--₺";
            }
        }

        // Sayfa yüklendiğinde dövizi çek
        fetchCurrency();
        // Her 5 dakikada bir güncelle
        setInterval(fetchCurrency, 300000);
    </script>

</body>
</html>
