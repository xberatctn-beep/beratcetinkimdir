<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Cetin.Digital</title>
    <meta name="description" content="Berat Çetin'in teknoloji, yazılım ve dijital dünyaya dair paylaşımları.">
    <link rel="stylesheet" href="style.css"> <style>
    body { background-color: #0f0f1a; color: white; margin: 0; font-family: sans-serif; }
    
    .blog-container {
        max-width: 1200px;
        margin: 100px auto;
        padding: 0 20px;
    }

    .blog-header { text-align: center; margin-bottom: 50px; }
    .blog-header h1 { font-size: 2.5rem; color: #fff; }

    .blog-categories {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 40px;
        flex-wrap: wrap;
    }

    .cat-btn {
        padding: 8px 20px;
        border-radius: 20px;
        border: 1px solid #a29bfe;
        background: transparent;
        color: #fff;
        cursor: pointer;
    }

    .cat-btn.active { background: #a29bfe; color: #0f0f1a; }

    .blog-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 25px;
    }

    .blog-card {
        background: #1a1a2e;
        border-radius: 15px;
        overflow: hidden;
        border: 1px solid rgba(162, 155, 254, 0.1);
    }

    .blog-image img { width: 100%; height: 200px; object-fit: cover; }
    .blog-content { padding: 20px; }
    .category { color: #a29bfe; font-size: 0.8rem; font-weight: bold; }
    .blog-content h3 a { color: #fff; text-decoration: none; font-size: 1.2rem; }
    .blog-footer { display: flex; justify-content: space-between; margin-top: 20px; color: #636e72; font-size: 0.8rem; }
</style> </head>
<body>

    <nav>
        <a href="index.html" class="logo">Cetin<span>.Digital</span></a>
        <div class="nav-links">
            <a href="index.html">Ana Sayfa</a>
            <a href="blog.html" class="active">Blog</a>
            <a href="index.html#contact">İletişim</a>
        </div>
    </nav>

    <main class="blog-container">
        <header class="blog-header">
            <h1>Dijital Notlarım</h1>
            <p>Yazılım, tasarım ve yapay zeka üzerine düşüncelerim.</p>
        </header>

        <div class="blog-categories">
            <button class="cat-btn active">Hepsi</button>
            <button class="cat-btn">Yazılım</button>
            <button class="cat-btn">Yapay Zeka</button>
            <button class="cat-btn">Otomobil</button>
        </div>

        <div class="blog-grid">
            <article class="blog-card">
                <div class="blog-image">
                    <img src="https://via.placeholder.com/400x250" alt="Blog Başlığı">
                </div>
                <div class="blog-content">
                    <span class="category">Teknoloji</span>
                    <h3><a href="#">Web Siteme Nasıl Canlı Döviz Bandı Ekledim?</a></h3>
                    <p>JavaScript ve API kullanarak sitenize dinamik finansal veriler eklemenin yolları...</p>
                    <div class="blog-footer">
                        <span>14 Mart 2026</span>
                        <span>3 dk okuma</span>
                    </div>
                </div>
            </article>
            </div>
    </main>

</body>
</html>
