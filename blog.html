<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Cetin.Digital</title>
    <meta name="description" content="Berat Çetin'in teknoloji, yazılım ve dijital dünyaya dair paylaşımları.">
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <nav>
        <a href="index.html" class="logo">Cetin<span>.Digital</span></a>
        <div class="nav-links">

            <a href="blog.html" class="active">Blog</a>
            <a href="index.html#contact">İletişim</a>

    <main class="blog-container">
        <header class="blog-header">
            <h1>Dijital Notlarım</h1>
            <p>Yazılım, tasarım ve yapay zeka üzerine düşüncelerim.</p>
        </header>

        <div class="blog-categories">
            <button class="cat-btn active">Hepsi</button>
            <button class="cat-btn">Yazılım</button>
            <button class="cat-btn">Yapay Zeka</button>
            <button class="cat-btn">Otomobil</button>

        <div class="blog-grid">

                <div class="blog-image">
                    <img src="https://via.placeholder.com/400x250" alt="Blog Başlığı">

                    <div class="blog-footer">

                        <span>3 dk okuma</span>
                    </div>
                </div>
            </article>
            </div>
